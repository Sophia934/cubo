<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cubo Mágico 3x3 - Puro e Interativo</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Montserrat', sans-serif;
        }
        
        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            color: white;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 14px;
            letter-spacing: 1px;
            pointer-events: none;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .info span {
            color: #ffd966;
            font-weight: bold;
        }
        
        .controls-tip {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            color: rgba(255,255,255,0.7);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
        }
        
        @media (max-width: 600px) {
            .info { font-size: 10px; bottom: 10px; left: 10px; }
            .controls-tip { font-size: 8px; }
        }
    </style>
</head>
<body>
    <div class="info">
        ✨ <span>CUBO 3x3</span> • arraste com o mouse para girar
    </div>
    <div class="controls-tip">
        🖱️ clique e arraste • rotação suave
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Configuração da cena ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a); // Fundo escuro elegante
        
        // --- Câmera ---
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4.5, 3.5, 5.5);
        camera.lookAt(0, 0, 0);
        
        // --- Renderer ---
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);
        
        // --- Iluminação refinada para destacar o branco ---
        const ambientLight = new THREE.AmbientLight(0x404060, 0.7);
        scene.add(ambientLight);
        
        // Luz principal direcional
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(3, 5, 2);
        mainLight.castShadow = true;
        mainLight.receiveShadow = false;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);
        
        // Luz de preenchimento traseira
        const backLight = new THREE.PointLight(0xffaa77, 0.4);
        backLight.position.set(-2, 1, -3);
        scene.add(backLight);
        
        // Luz lateral fria
        const fillLight = new THREE.PointLight(0x88aaff, 0.35);
        fillLight.position.set(2, 1.5, 2.5);
        scene.add(fillLight);
        
        // Luz inferior suave
        const rimLight = new THREE.PointLight(0xccaa88, 0.25);
        rimLight.position.set(0, -2, 1.5);
        scene.add(rimLight);
        
        // Luz superior
        const topLight = new THREE.PointLight(0xffffff, 0.3);
        topLight.position.set(0, 4, 0);
        scene.add(topLight);
        
        // Grid decorativo simples e discreto (apenas referência espacial, sem ser chamativo)
        const gridHelper = new THREE.GridHelper(8, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -1.9;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.2;
        scene.add(gridHelper);
        
        // --- GRUPO PRINCIPAL DO CUBO ---
        const rubikGroup = new THREE.Group();
        scene.add(rubikGroup);
        
        // Configuração das peças com espaçamento visual (gap de 0.06 entre peças)
        const pieceSize = 0.94;      // Tamanho da peça
        const offset = 1.0;          // Distância entre centros (cria gap de 0.06)
        
        // Função para criar uma peça branca com bordas elegantes
        function createPiece(x, y, z) {
            const geometry = new THREE.BoxGeometry(pieceSize, pieceSize, pieceSize);
            // Material branco perolado com acabamento premium
            const material = new THREE.MeshStandardMaterial({
                color: 0xfafbfd,
                roughness: 0.28,
                metalness: 0.12,
                emissive: 0x000000,
                flatShading: false
            });
            const cube = new THREE.Mesh(geometry, material);
            cube.castShadow = true;
            cube.receiveShadow = false;
            
            // Bordas em cinza escuro para destacar o espaçamento entre peças
            const edgesGeo = new THREE.EdgesGeometry(geometry);
            const edgesMat = new THREE.LineBasicMaterial({ color: 0x2c3e4e });
            const wireframe = new THREE.LineSegments(edgesGeo, edgesMat);
            cube.add(wireframe);
            
            cube.position.set(x * offset, y * offset, z * offset);
            return cube;
        }
        
        // Criar todas as 27 peças (coordenadas -1, 0, 1)
        for (let i = -1; i <= 1; i++) {
            for (let j = -1; j <= 1; j++) {
                for (let k = -1; k <= 1; k++) {
                    const piece = createPiece(i, j, k);
                    rubikGroup.add(piece);
                }
            }
        }
        
        // --- SISTEMA DE ROTAÇÃO SUAVE (SEM BAMBOLEIO, SEM CÍRCULOS EXTRAS) ---
        
        let targetRotationYaw = 0;      // Rotação horizontal (em Y)
        let targetRotationPitch = 0;    // Rotação vertical (em X)
        let currentRotationYaw = 0;
        let currentRotationPitch = 0;
        
        let isDragging = false;
        let lastMouseX = 0;
        let lastMouseY = 0;
        
        // Sensibilidade natural
        const sensitivity = 0.007;
        // Fator de suavidade
        const smoothFactor = 0.12;
        
        // Eventos de mouse
        window.addEventListener('mousedown', (e) => {
            if (e.button === 0) {
                isDragging = true;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
                document.body.style.cursor = 'grabbing';
                e.preventDefault();
            }
        });
        
        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const deltaX = e.clientX - lastMouseX;
                const deltaY = e.clientY - lastMouseY;
                
                if (deltaX !== 0 || deltaY !== 0) {
                    targetRotationYaw += deltaX * sensitivity;
                    targetRotationPitch += deltaY * sensitivity;
                    
                    // Limite suave para evitar que o cubo vire completamente (mantém a experiência confortável)
                    targetRotationPitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, targetRotationPitch));
                    
                    lastMouseX = e.clientX;
                    lastMouseY = e.clientY;
                }
            }
        });
        
        window.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                document.body.style.cursor = 'default';
            }
        });
        
        // Suporte para touch (mobile)
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                lastMouseX = e.touches[0].clientX;
                lastMouseY = e.touches[0].clientY;
                e.preventDefault();
            }
        });
        
        window.addEventListener('touchmove', (e) => {
            if (isDragging && e.touches.length === 1) {
                const deltaX = e.touches[0].clientX - lastMouseX;
                const deltaY = e.touches[0].clientY - lastMouseY;
                if (deltaX !== 0 || deltaY !== 0) {
                    targetRotationYaw += deltaX * sensitivity;
                    targetRotationPitch += deltaY * sensitivity;
                    targetRotationPitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, targetRotationPitch));
                    lastMouseX = e.touches[0].clientX;
                    lastMouseY = e.touches[0].clientY;
                }
                e.preventDefault();
            }
        });
        
        window.addEventListener('touchend', () => {
            isDragging = false;
        });
        
        // Prevenir arraste padrão
        window.addEventListener('dragstart', (e) => e.preventDefault());
        
        // --- ANIMAÇÃO PRINCIPAL ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Interpolação suave dos valores de rotação
            currentRotationYaw += (targetRotationYaw - currentRotationYaw) * smoothFactor;
            currentRotationPitch += (targetRotationPitch - currentRotationPitch) * smoothFactor;
            
            // Aplicar rotação ao grupo - ordem YXZ para movimento natural de "pegar"
            rubikGroup.rotation.order = 'YXZ';
            rubikGroup.rotation.x = currentRotationPitch;
            rubikGroup.rotation.y = currentRotationYaw;
            rubikGroup.rotation.z = 0; // Sem inclinação lateral para evitar bamboleio
            
            // Renderizar cena
            renderer.render(scene, camera);
        }
        
        animate();
        
        // Ajuste responsivo da janela
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Pequena rotação inicial suave para dar vida
        setTimeout(() => {
            targetRotationYaw = 0.35;
            targetRotationPitch = 0.2;
        }, 100);
        
        console.log('Cubo 3x3 carregado - apenas o cubo puro, sem elementos circulares, movimento suave e estável');
    </script>
</body>
</html>
